// ── HELPERS ───────────────────────────────────────────────────────────────────
function getDI(n){
  if(n<1||n>168)return null;
  const wi=Math.floor((n-1)/7),di=(n-1)%7;
  const wk=WK[wi];
  return{n,wi,di,week:wk,day:wk.days[di],isWknd:di>=5,mi:wk.m-1};
}
function mPct(m,days){
  let done=0,tot=0;
  for(let i=(m-1)*28+1;i<=(m-1)*28+28&&i<=168;i++){
    const di=getDI(i);if(!di)continue;
    const d=days[i]||{};
    if(di.isWknd){tot++;if(d.b||d.r)done++;}
    else{tot+=2;if(d.m)done++;if(d.e)done++;}
  }
  return tot>0?Math.round((done/tot)*100):0;
}
function todayN(sd){
  if(!sd)return null;
  const s=new Date(sd),t=new Date();
  s.setHours(0,0,0,0);t.setHours(0,0,0,0);
  const n=Math.floor((t-s)/864e5)+1;
  return n<1?null:n>168?169:n;
}
function streak(days,tn){
  if(!tn)return 0;
  let s=0;
  for(let n=Math.min(tn,168);n>=1;n--){
    const d=days[n]||{},di=getDI(n);if(!di)continue;
    const act=di.isWknd?(d.b||d.r):(d.m||d.e);
    if(act)s++;else if(n<tn)break;
  }
  return s;
}
function totPct(days){
  let done=0;
  for(let n=1;n<=168;n++){
    const di=getDI(n);if(!di)continue;
    const d=days[n]||{};
    if(di.isWknd){if(d.b||d.r)done+=2;}
    else{if(d.m)done++;if(d.e)done++;}
  }
  return Math.round((done/336)*100);
}
function wPct(wi,days){
  const ws=wi*7+1;let done=0,tot=0;
  for(let i=ws;i<ws+7&&i<=168;i++){
    const di=getDI(i);if(!di)continue;
    const d=days[i]||{};
    if(di.isWknd){tot++;if(d.b||d.r)done++;}
    else{tot+=2;if(d.m)done++;if(d.e)done++;}
  }
  return tot>0?Math.round((done/tot)*100):0;
}

// ── RING ──────────────────────────────────────────────────────────────────────
function Ring({pct,color,size=58,stroke=4}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r,off=c-(pct/100)*c;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} style={{transform:"rotate(-90deg)",display:"block"}}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={BD} strokeWidth={stroke}/>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}
          style={{transition:"stroke-dashoffset 0.7s ease"}}/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:size>50?12:10,fontWeight:700,color}}>{pct}%</span>
      </div>
    </div>
  );
}

        {DNS[(n-1)%7].toUpperCase()} — DAY {n} OF 168
      </div>
      {isWknd?(
        <div>
          {isSat?(
            <>
              <Blk col={AM} ic="🏗️" lb="BUILD PROJECT" txt={day.b} done={!!sv.b} onToggle={()=>onToggle(n,"b")}/>
              <Sub col={AM} lb="DELIVERABLE" txt={day.d}/>
            </>
          ):(
            <>
              <Blk col={PU} ic="📖" lb="REVIEW + PREP" txt={day.r} done={!!sv.r} onToggle={()=>onToggle(n,"r")}/>
              <Sub col={PU} lb="NEXT WEEK PREP" txt={day.p}/>
            </>
          )}
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:9}}>
          <Blk col={AC} ic="🧠" lb="MORNING 8:30–10:45 AM" txt={day.t} done={!!sv.m} onToggle={()=>onToggle(n,"m")}/>
          <Blk col={GR} ic="💻" lb="EVENING 9:30–11:30 PM" txt={day.e} done={!!sv.e} onToggle={()=>onToggle(n,"e")}/>
        </div>
      )}
      <textarea value={note} onChange={e=>setNote(e.target.value)} onBlur={()=>onNote(n,note)}
        placeholder="Add a note for this day..."
        style={{marginTop:10,width:"100%",background:SF,border:`1px solid ${BD}`,
          borderRadius:7,padding:"7px 10px",color:TX,fontFamily:"'Outfit',sans-serif",
          fontSize:11,lineHeight:1.5,minHeight:48,display:"block"}}/>
    </div>
  );
}
function Blk({col,ic,lb,txt,done,onToggle}){
  return(
    <div style={{marginBottom:4}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
        <span style={{fontSize:9,color:col,fontWeight:700,letterSpacing:1}}>{ic} {lb}</span>
        <button onClick={e=>{e.stopPropagation();onToggle();}} style={{
          padding:"2px 10px",background:done?`${col}22`:"transparent",
          border:`1px solid ${done?col:BD2}`,borderRadius:5,color:done?col:MU,
          fontSize:10,fontWeight:600,fontFamily:"'Outfit',sans-serif"
        }}>{done?"✓ Done":"Mark done"}</button>
      </div>
      <div style={{fontSize:12,color:done?MU:TX,lineHeight:1.5,textDecoration:done?"line-through":"none"}}>{txt}</div>
    </div>
  );
}
function Sub({col,lb,txt}){
  return(
    <div style={{background:SF,borderRadius:7,padding:"7px 10px",marginTop:5,borderLeft:`3px solid ${col}55`}}>
      <div style={{fontSize:8,color:col,fontWeight:700,letterSpacing:1,marginBottom:2}}>{lb}</div>
      <div style={{fontSize:11,color:MU,lineHeight:1.5}}>{txt}</div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[data,setData]=useState(null);
  const[view,setView]=useState("today");
  const[sm,setSm]=useState(1);

  useEffect(()=>{loadData().then(setData);},[]);

  const save=useCallback(async(next)=>{setData(next);await saveData(next);},[]);
  const tn=useMemo(()=>data?todayN(data.startDate):null,[data?.startDate]);
  const stk=useMemo(()=>data?streak(data.days||{},tn):0,[data,tn]);
  const pct=useMemo(()=>data?totPct(data.days||{}):0,[data]);

  const toggle=useCallback(async(n,f)=>{
    const prev=(data.days||{})[n]||{};
    await save({...data,days:{...(data.days||{}),[n]:{...prev,[f]:!prev[f]}}});
  },[data,save]);
  const note=useCallback(async(n,t)=>{
    const prev=(data.days||{})[n]||{};
    await save({...data,days:{...(data.days||{}),[n]:{...prev,note:t}}});
  },[data,save]);

  if(!data)return(
    <div style={{height:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",color:MU,fontFamily:"'Outfit',sans-serif",fontSize:13}}>
      Loading your roadmap...
    </div>
  );

  if(!data.startDate)return<Setup onStart={d=>save({...data,startDate:d})}/>;

  return(
    <div id="rm" style={{minHeight:"100vh",background:BG,color:TX,fontFamily:"'Outfit',sans-serif"}}>
      <Header tn={tn} stk={stk} pct={pct}/>
      <Tabs view={view} sm={sm} setView={setView} setSm={setSm}/>
      <div style={{maxWidth:840,margin:"0 auto",padding:"14px 13px"}}>
        {view==="today"&&<Today tn={tn} data={data} onToggle={toggle} onNote={note}/>}
        {view==="overview"&&<Overview data={data} tn={tn} onMonth={m=>{setSm(m);setView("month");}}/>}
        {view==="month"&&<MonthView month={sm} data={data} tn={tn} onToggle={toggle} onNote={note}/>}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
